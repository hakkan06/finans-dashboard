stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE: "finans-backend"
  FRONTEND_IMAGE: "finans-frontend"
  # Commit SHA'sının ilk 8 karakterini dinamik versiyon (tag) olarak belirliyoruz
  TAG: $CI_COMMIT_SHORT_SHA

# --- BACKEND DERLEME SÜRECİ ---
build-backend:
  stage: build
  script: |
    - echo "Backend imajı derleniyor... Versiyon: $TAG"
    - cd finans-backend
    - docker build -t $BACKEND_IMAGE:$TAG -t $BACKEND_IMAGE:latest .
  tags:
    - macbook-runner  # Kendi runner'ına verdiğin tag'i buraya yazmalısın (Örn: shell, my-mac-runner)

# --- FRONTEND DERLEME SÜRECİ ---
build-frontend:
  stage: build
  script: |
    - echo "Frontend imajı derleniyor... Versiyon: $TAG"
    - cd finans-frontend
    - docker build -t $FRONTEND_IMAGE:$TAG -t $FRONTEND_IMAGE:latest .
  tags:
    - macbook-runner

# --- KUBERNETES DEPLOYMENT SÜRECİ ---
deploy-to-k8s:
  stage: deploy
  script: |
    - echo "Kubernetes deployment başlatılıyor..."
    - cd k8s
    
    # K8s YAML dosyalarındaki eski image etiketlerini 'sed' komutuyla yeni TAG ile değiştiriyoruz
    # MacOS runner kullanıyorsan sed komutunda uyumsuzluk olmaması için (-i '') kullanıyoruz. 
    # Linux kullanıyorsan (-i) yeterlidir. Aşağıdaki yapı evrensel bir sed değişimidir.
    - 'sed -i.bak "s|image: $BACKEND_IMAGE:.*|image: $BACKEND_IMAGE:$TAG|g" backend.yaml'
    - 'sed -i.bak "s|image: $FRONTEND_IMAGE:.*|image: $FRONTEND_IMAGE:$TAG|g" frontend.yaml'
    - rm -f *.bak
    
    # Değişen YAML dosyalarını K8s'e uygula
    - kubectl apply -f backend.yaml
    - kubectl apply -f frontend.yaml
    - kubectl apply -f cronjob.yaml
    - echo "Uygulama başarıyla güncellendi!"
  environment:
    name: production
  tags:
    - macbook-runner
  only:
    - main  # Sadece main (veya master) dalına kod itildiğinde çalışır
