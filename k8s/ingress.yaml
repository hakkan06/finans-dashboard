apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finans-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-finans-basic-auth@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - finans.185.229.119.58.nip.io
    - api.185.229.119.58.nip.io
    secretName: finans-tls-secret
  rules:
  - host: finans.185.229.119.58.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finans-frontend-service
            port:
              number: 8501
  - host: api.185.229.119.58.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finans-backend-service
            port:
              number: 8000
