apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finans-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: finans.185.229.119.58.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finans-frontend-service
            port:
              number: 8501
  - host: api.185.229.119.58.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finans-backend-service
            port:
              number: 8000
