name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]
    steps:
      - name: Workspace temizle
        continue-on-error: true
        run: |
          # Nested .git dizinlerini kaldır (eski submodule kalıntıları)
          find . -mindepth 2 -maxdepth 5 -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          # builds/ klasörünü temizle
          rm -rf builds/ 2>/dev/null || true

      - name: Kodu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Backend imajını derle
        run: |
          cd finans-backend
          docker build -t finans-backend:${{ github.sha }} -t finans-backend:latest .
          # Derlenen imajı K3s'in containerd motoruna enjekte et (ImagePullBackOff hatasını önler)
          docker save finans-backend:${{ github.sha }} finans-backend:latest | sudo k3s ctr images import -

      - name: Frontend imajını derle
        run: |
          cd finans-frontend
          docker build -t finans-frontend:${{ github.sha }} -t finans-frontend:latest .
          # Derlenen imajı K3s'in containerd motoruna enjekte et (ImagePullBackOff hatasını önler)
          docker save finans-frontend:${{ github.sha }} finans-frontend:latest | sudo k3s ctr images import -

      - name: Kubernetes'e deploy et
        run: |
          # 🔒 0. GÜVENLİK BİLEŞENLERİNİ KUR (Cert-Manager ve CRDs)
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
          # Webhook'un ayağa kalkmasını bekle (ClusterIssuer nesnelerinin doğrulanabilmesi için)
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=90s

          # 🚀 1. TÜM K8S BİLEŞENLERİNİ K8S KLASÖRÜNDEN OTONOM UYGULA
          kubectl apply -f k8s/auth-middleware.yaml
          kubectl apply -f k8s/cluster-issuer.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/cronjob.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # 🔄 2. TAZE DERLENEN DOCKER İMAJLARINI BU İSKELETLERE BAS
          kubectl set image deployment/finans-backend-deployment \
            finans-backend=finans-backend:${{ github.sha }}
          kubectl set image deployment/finans-frontend-deployment \
            finans-frontend=finans-frontend:${{ github.sha }}
          
          # ⏱️ 3. ROLLOUT DURUMUNU TAKİP ET
          kubectl rollout status deployment/finans-backend-deployment
          kubectl rollout status deployment/finans-frontend-deployment
