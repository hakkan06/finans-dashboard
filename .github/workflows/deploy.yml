name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux]
    steps:
      - name: Workspace temizle
        continue-on-error: true
        run: |
          # Nested .git dizinlerini kaldır (eski submodule kalıntıları)
          find . -mindepth 2 -maxdepth 5 -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          # builds/ klasörünü temizle
          rm -rf builds/ 2>/dev/null || true

      - name: Kodu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Backend imajını derle
        run: |
          cd finans-backend
          docker build -t finans-backend:${{ github.sha }} -t finans-backend:latest .

      - name: Frontend imajını derle
        run: |
          cd finans-frontend
          docker build -t finans-frontend:${{ github.sha }} -t finans-frontend:latest .

      - name: Kubernetes'e deploy et
        run: |
          # 🚀 1. ADIM: EĞER SİSTEMDE YOKSA ÖNCE İSKELETLERİ (DEPLOYMENT VE SERVICE) OLUŞTUR
          # Projenin ana klasör yapısına göre backend ve frontend altındaki yaml'ları apply ediyoruz.
          # Eğer bu dosyalar ana dizindeyse yolunu değiştirebilirsin (Örn: kubectl apply -f backend.yaml)
          kubectl apply -f finans-backend/backend.yaml
          kubectl apply -f finans-frontend/frontend.yaml
          
          # 🔄 2. ADIM: TAZE DERLENEN DOCKER İMAJLARINI BU İSKELETLERE BAS
          kubectl set image deployment/finans-backend-deployment \
            finans-backend=finans-backend:${{ github.sha }}
          kubectl set image deployment/finans-frontend-deployment \
            finans-frontend=finans-frontend:${{ github.sha }}
          
          # ⏱️ 3. ADIM: SİSTEMİN SAĞLIKLI BİR ŞEKİLDE AYAĞA KALKMASINI BEKLE (ROLLOUT)
          kubectl rollout status deployment/finans-backend-deployment
          kubectl rollout status deployment/finans-frontend-deployment
